<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldwide Address Parser</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 40px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input[type="text"] { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 12px 25px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        pre { text-align: left; background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌍 Worldwide Address Parser</h2>
        <p>Enter any address below to get full JSON details:</p>
        
        <form action="/search" method="POST">
            <input type="text" name="address" placeholder="Enter address (e.g., 10 Downing St, London)" required>
            <br>
            <button type="submit">Get JSON Details</button>
        </form>
    </div>
</body>
</html>
